name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.0.0'

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Validate SQLite initialization
        run: node scripts/init-db.node.js

      - name: Run unit tests
        run: bun test

      - name: Build app
        run: bun run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        env:
          PW_TEST: '1'
        run: npx playwright test --reporter=list,html --retries=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**
